name: Build & Release APK

# Triggers:
#   1. Push to master → builds APK, auto-creates tag & GitHub Release
#   2. Push to other branches → builds APK only (artifact, no release)
#   3. Manual trigger → builds APK + creates Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0-beta)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version and prepare APKs
        id: apk_info
        run: |
          # Get version from build.gradle.kts
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Debug APK
          cp app/build/outputs/apk/debug/app-debug.apk MEDHA-v${VERSION}-debug.apk

          # Release APK (unsigned unless signing is configured)
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk MEDHA-v${VERSION}-release.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk MEDHA-v${VERSION}-release.apk
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Always upload as artifact (available for any build)
      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEDHA-debug-apk
          path: MEDHA-*-debug.apk
          retention-days: 30

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEDHA-release-apk
          path: MEDHA-*-release.apk
          retention-days: 30

      # Auto-create tag and release on master push or manual trigger
      - name: Generate release tag
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        id: release_tag
        run: |
          VERSION="${{ steps.apk_info.outputs.version }}"
          RUN="${{ github.run_number }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_name }}" ]]; then
            TAG="${{ github.event.inputs.release_name }}"
          else
            TAG="v${VERSION}-build.${RUN}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=MEDHA $TAG" >> $GITHUB_OUTPUT

          # Get commit message for release notes
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release_tag.outputs.tag }}" -m "Release ${{ steps.release_tag.outputs.tag }}"
          git push origin "${{ steps.release_tag.outputs.tag }}"

      - name: Create GitHub Release with APKs
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.release_tag.outputs.tag, 'beta') || contains(steps.release_tag.outputs.tag, 'alpha') }}
          generate_release_notes: true
          files: |
            MEDHA-*-debug.apk
            MEDHA-*-release.apk
          body: |
            ## MEDHA - AI Chat for Android

            ### Download & Install
            1. Download **`MEDHA-v${{ env.VERSION }}-debug.apk`** from assets below
            2. Transfer to your Android phone (or download directly on phone)
            3. Enable **"Install from unknown sources"** if prompted
            4. Open the APK → tap **Install**
            5. Launch MEDHA and follow the in-app setup guide

            ### APK Files
            | File | Description |
            |---|---|
            | `MEDHA-v${{ env.VERSION }}-debug.apk` | Debug build — works on any device, recommended for testing |
            | `MEDHA-v${{ env.VERSION }}-release.apk` | Release build — unsigned |

            ### Latest Changes
            ```
            ${{ steps.release_tag.outputs.commit_msg }}
            ```

            ---
            > Built automatically by GitHub Actions from commit `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
